# /etc/nginx/sites-available/mexc-monitor
# Symlink: ln -s /etc/nginx/sites-available/mexc-monitor /etc/nginx/sites-enabled/
#
# Handles:
#   HTTP  (80)  → permanent redirect to HTTPS
#   HTTPS (443) → reverse proxy to Node.js on 127.0.0.1:3000
#   WebSocket   → upgrade header forwarded for Socket.IO

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;   # Replace _ with your domain if you have one

    # --- TLS (self-signed; replace with Let's Encrypt paths for a real domain)
    ssl_certificate     /etc/ssl/mexc-monitor/server.crt;
    ssl_certificate_key /etc/ssl/mexc-monitor/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       no-referrer;

    # --- Increase timeout to keep WebSocket alive all day
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # --- Proxy to Node.js dashboard
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for Socket.IO)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Let's Encrypt ACME challenge (for future cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ── Let's Encrypt upgrade (run once you have a domain) ────────────────────────
# certbot --nginx -d yourdomain.com
# It will auto-edit this file and add the cert paths.
